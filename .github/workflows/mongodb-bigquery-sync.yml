name: MongoDB → BigQuery Sync
on:
  schedule:
    - cron: '0 2,14 * * *'  # 4h/16h Madagascar (UTC+3)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: 'projects/476884137835/locations/global/workloadIdentityPools/github-mada-pool/providers/github-mada-provider'
        service_account: 'veille-media-mada-sync@veille-media-mada-sync.iam.gserviceaccount.com'
        project_id: 'veille-media-mada-sync'

    # ✅ Test BIGQUERY DIRECT (ignore bug gcloud impersonation)
    - name: Test BigQuery Access
      run: |
        bq ls --project_id=veille-media-mada-sync
        echo "✅ WIF actif !"

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - run: pip install -r requirements.txt

    - run: python etl/mongo_to_bigquery.py
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        GCP_PROJECT_ID: veille-media-mada-sync
        BIGQUERY_DATASET: veille_mada