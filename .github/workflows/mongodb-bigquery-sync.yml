name: MongoDB → BigQuery Sync
on:
  schedule:
    - cron: '0 2,14 * * *'  # 4h/16h Madagascar
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    # 🔐 Workload Identity (AUCUN secret GCP !)
    - uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: 'projects/476884137835/locations/global/workloadIdentityPools/github-pool-veille/providers/github-provider-mada'
        service_account: 'veille-media-mada-sync@veille-media-mada-sync.iam.gserviceaccount.com'
        project_id: 'veille-media-mada-sync'

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - run: pip install -r requirements.txt

    # 🚀 Votre script hybride détecte auto Workload Identity !
    - run: python etl/mongo_to_bigquery.py
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
