name: Daily ETL

on:
  schedule:
    - cron: '0 */3 * * *'  # Toutes les 3h
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # ✅ v3 → v4 (Node 24 OK)

      - name: Set up Python
        uses: actions/setup-python@v5  # ✅ v4 → v5 (Node 24 OK)
        with:
          python-version: '3.13'

      - name: Cache HuggingFace models
        uses: actions/cache@v4  # ✅ v3 → v4 (Node 24 OK)
        with:
          path: ~/.cache/huggingface
          key: huggingface-models-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            huggingface-models-

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m flows.etl_flow
      
      - name: Upload ETL logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: etl-logs-${{ github.run_number }}
          path: |
            *.log
            orange_whatsapp_articles_*.json
